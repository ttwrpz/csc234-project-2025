name: user_centric_mobile_app
description: "MoodBloom - A mood tracking app with a virtual garden"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  google_sign_in: ^6.2.2

  # Local Storage
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path: ^1.9.0

  # UI
  google_fonts: ^6.2.1
  table_calendar: ^3.1.3
  image_picker: ^1.1.2
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.5+1

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.1.1
  uuid: ^4.5.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
